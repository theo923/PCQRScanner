<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="#0f172a"/>

  <!-- QR corners: top-left -->
  <rect x="14" y="14" width="36" height="36" rx="4" fill="none" stroke="#3b82f6" stroke-width="6"/>
  <rect x="24" y="24" width="16" height="16" rx="2" fill="#3b82f6"/>

  <!-- QR corners: top-right -->
  <rect x="78" y="14" width="36" height="36" rx="4" fill="none" stroke="#3b82f6" stroke-width="6"/>
  <rect x="88" y="24" width="16" height="16" rx="2" fill="#3b82f6"/>

  <!-- QR corners: bottom-left -->
  <rect x="14" y="78" width="36" height="36" rx="4" fill="none" stroke="#3b82f6" stroke-width="6"/>
  <rect x="24" y="88" width="16" height="16" rx="2" fill="#3b82f6"/>

  <!-- QR data dots -->
  <rect x="78" y="78" width="8" height="8" rx="1" fill="#60a5fa"/>
  <rect x="90" y="78" width="8" height="8" rx="1" fill="#60a5fa"/>
  <rect x="102" y="78" width="8" height="8" rx="1" fill="#60a5fa"/>
  <rect x="78" y="90" width="8" height="8" rx="1" fill="#60a5fa"/>
  <rect x="102" y="90" width="8" height="8" rx="1" fill="#60a5fa"/>
  <rect x="90" y="102" width="8" height="8" rx="1" fill="#60a5fa"/>
  <rect x="78" y="102" width="8" height="8" rx="1" fill="#60a5fa"/>

  <!-- Scan line -->
  <line x1="10" y1="64" x2="118" y2="64" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <!-- Glow effect for scan line -->
  <line x1="10" y1="64" x2="118" y2="64" stroke="#38bdf8" stroke-width="7" stroke-linecap="round" opacity="0.2"/>
</svg>
